<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="一份长久的情绪陪伴">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="applogo.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="情绪陪伴">
    <title>情绪陪伴工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: background-color 0.5s ease;
        }
        
        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin-top: 20px;
            margin-bottom: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 14px;
            color: #666;
        }
        
        .quote-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .quote-text {
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        
        .quote-author {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .mood-section {
            margin-bottom: 30px;
        }
        
        .mood-section h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .mood-buttons {
            display: flex;
            justify-content: space-between;
        }
        
        .mood-btn {
            flex: 1;
            padding: 12px;
            margin: 0 5px;
            border: none;
            border-radius: 10px;
            background: #f0f0f0;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .mood-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
        }
        
        .mood-btn.active {
            background: #667eea;
            color: white;
        }
        
        .mood-response {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            background: #f8f9fa;
            display: none;
        }
        
        .friendship-counter {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .friendship-counter h2 {
            font-size: 16px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .days-count {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        /* 日历样式 */
        .calendar {
            margin: 20px 0;
        }
        
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .calendar-header button {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
        }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }
        
        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .calendar-day:hover {
            background: #e3e7ff;
        }
        
        .calendar-day.today {
            background: #667eea;
            color: white;
        }
        
        .calendar-day.has-mood {
            position: relative;
        }
        
        .calendar-day.has-mood::after {
            content: '';
            position: absolute;
            bottom: 2px;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #667eea;
        }
        
        .calendar-day.selected {
            background: #764ba2;
            color: white;
        }
        
        .weekday {
            font-size: 12px;
            color: #666;
            font-weight: bold;
            padding: 5px 0;
        }
        
        .anniversaries {
            font-size: 12px;
            color: #666;
        }
        
        .surprise-section {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        
        .surprise-section h2 {
            font-size: 16px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .surprise-section p {
            font-size: 14px;
            color: #666;
        }
        
        .secret-message {
            margin-top: 20px;
            padding: 15px;
            background: #667eea;
            color: white;
            border-radius: 10px;
            display: none;
        }
        
        .petals {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }
        
        .petal {
            position: absolute;
            width: 10px;
            height: 10px;
            background: pink;
            border-radius: 150% 0 150% 0;
            animation: fall linear infinite;
        }
        
        @keyframes fall {
            0% {
                transform: translateY(-10%) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        .footer {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="petals" id="petals"></div>
    
    <div class="container">
        <div class="header">
            <h1>沫沫的专属树洞</h1>
            <p>fliescerko的感谢小礼物</p>
        </div>
        
        <div class="quote-card">
            <div class="quote-text" id="quoteText">点击刷新获取新的语录</div>
            <div class="quote-author">— fliescerko想对你说</div>
        </div>
        

        
        <div class="friendship-counter">
            <h2>重要日子记录</h2>
            <div class="days-count" id="daysCount">选择日期记录心情</div>
            
            <!-- 日历 -->
            <div class="calendar">
                <div class="calendar-header">
                    <button id="prevMonth">←</button>
                    <h3 id="currentMonth"></h3>
                    <button id="nextMonth">→</button>
                </div>
                <div class="calendar-grid">
                    <div class="weekday">日</div>
                    <div class="weekday">一</div>
                    <div class="weekday">二</div>
                    <div class="weekday">三</div>
                    <div class="weekday">四</div>
                    <div class="weekday">五</div>
                    <div class="weekday">六</div>
                    <!-- 日期将通过JavaScript动态生成 -->
                </div>
            </div>
            

            
            <div class="anniversaries" id="anniversaries">
                历史记录：
            </div>
        </div>
        
        <div class="surprise-section">
            <h2>摇一摇鼓励</h2>
            <p>摇一摇手机，获取专属鼓励</p>
            <div class="secret-message" id="secretMessage"></div>
        </div>
    </div>
    
    <div class="footer">
        <p>用爱编织的陪伴工具</p>
    </div>
    
    <script>
        // 语录库
        const quotes = [
            "谢谢你在我难过的时候安慰我",
            "不知道应该怎么感谢你,只能用这种些许硬核的方式来表达",
            "希望你可以喜欢",
            "这是专属于你的心情树洞",
            "一切的情绪都可以在这里被记录",
            


        ];
        
        // 鼓励语库
        const encouragements = [
            "今天也要加油哦！",
            "你是最棒的！",
            "困难只是暂时的，坚持下去！",
            "你值得所有的美好",
            "相信自己，你可以的",
            "每一步都在靠近目标",
            "你的努力会有回报的",
            "今天的你比昨天更优秀",
            "保持微笑，好运会来的",
            "你是独一无二的"
        ];
        
        // 随机获取语录
        function getRandomQuote() {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            return quotes[randomIndex];
        }
        
        // 随机获取鼓励语
        function getRandomEncouragement() {
            const randomIndex = Math.floor(Math.random() * encouragements.length);
            return encouragements[randomIndex];
        }
        
        // 从本地存储获取心情记录
        function getMoodRecords() {
            const records = localStorage.getItem('moodRecords');
            return records ? JSON.parse(records) : [];
        }
        
        // 保存心情记录到本地存储
        function saveMoodRecord(dateString, mood) {
            const records = getMoodRecords();
            
            // 检查该日期是否已经有记录
            const existingIndex = records.findIndex(record => record.date === dateString);
            
            if (existingIndex !== -1) {
                // 更新现有记录
                records[existingIndex].mood = mood;
            } else {
                // 添加新记录
                records.push({
                    date: dateString,
                    mood: mood
                });
            }
            
            localStorage.setItem('moodRecords', JSON.stringify(records));
            updateMoodRecords();
            renderCalendar();
        }
        
        // 更新心情记录显示
        function updateMoodRecords() {
            const records = getMoodRecords();
            const anniversariesElement = document.getElementById('anniversaries');
            
            if (records.length === 0) {
                anniversariesElement.innerHTML = "历史记录：<br>暂无记录";
                return;
            }
            
            // 按日期降序排序
            records.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            let recordsHTML = "历史记录：<br>";
            records.forEach(record => {
                const date = new Date(record.date);
                const formattedDate = date.toLocaleDateString('zh-CN');
                let moodText = '';
                
                if (record.mood) {
                    switch (record.mood) {
                        case 'happy': moodText = '开心'; break;
                        case 'sad': moodText = '难过'; break;
                        case 'angry': moodText = '生气'; break;
                        case 'tired': moodText = '疲惫'; break;
                    }
                }
                
                if (moodText) {
                    recordsHTML += `${formattedDate}：${moodText}`;
                    if (record.diary) {
                        recordsHTML += `（有日记）`;
                    }
                    recordsHTML += `<br>`;
                } else if (record.diary) {
                    recordsHTML += `${formattedDate}：有日记<br>`;
                }
            });
            
            anniversariesElement.innerHTML = recordsHTML;
        }
        
        // 日历相关变量
        let currentDate = new Date();
        let selectedDate = null;
        
        // 渲染日历
        function renderCalendar() {
            const calendarGrid = document.querySelector('.calendar-grid');
            const currentMonthElement = document.getElementById('currentMonth');
            
            // 清空日历网格（保留星期标题）
            const dayElements = calendarGrid.querySelectorAll('.calendar-day');
            dayElements.forEach(day => day.remove());
            
            // 获取当前月份和年份
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            // 设置当前月份标题
            currentMonthElement.textContent = `${year}年${month + 1}月`;
            
            // 获取当月第一天是星期几
            const firstDay = new Date(year, month, 1).getDay();
            
            // 获取当月的天数
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            // 获取心情记录
            const moodRecords = getMoodRecords();
            const moodDates = new Set(moodRecords.map(record => record.date));
            
            // 添加上个月的占位符
            for (let i = 0; i < firstDay; i++) {
                const emptyDay = document.createElement('div');
                emptyDay.classList.add('calendar-day');
                calendarGrid.appendChild(emptyDay);
            }
            
            // 添加当月的日期
            for (let day = 1; day <= daysInMonth; day++) {
                const dayElement = document.createElement('div');
                dayElement.classList.add('calendar-day');
                dayElement.textContent = day;
                
                // 格式化日期字符串
                const dateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                
                // 检查是否是今天
                const today = new Date();
                const todayString = today.toISOString().split('T')[0];
                if (dateString === todayString) {
                    dayElement.classList.add('today');
                }
                
                // 检查是否有心情记录
                if (moodDates.has(dateString)) {
                    dayElement.classList.add('has-mood');
                }
                
                // 检查是否是选中的日期
                if (selectedDate === dateString) {
                    dayElement.classList.add('selected');
                }
                
                // 添加点击事件
                dayElement.addEventListener('click', () => {
                    // 跳转到日期详情页面
                    window.location.href = `./date-detail.html?date=${dateString}`;
                });
                
                calendarGrid.appendChild(dayElement);
            }
        }
        

        
        // 处理月份切换
        function handleMonthNavigation() {
            document.getElementById('prevMonth').addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() - 1);
                renderCalendar();
            });
            
            document.getElementById('nextMonth').addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() + 1);
                renderCalendar();
            });
        }
        
        // 创建花瓣雨
        function createPetals() {
            const petalsContainer = document.getElementById('petals');
            petalsContainer.innerHTML = '';
            
            for (let i = 0; i < 50; i++) {
                const petal = document.createElement('div');
                petal.classList.add('petal');
                petal.style.left = Math.random() * 100 + '%';
                petal.style.animationDuration = (Math.random() * 3 + 2) + 's';
                petal.style.animationDelay = Math.random() * 2 + 's';
                petal.style.transform = 'rotate(' + Math.random() * 360 + 'deg)';
                petalsContainer.appendChild(petal);
            }
        }
        

        
        // 处理摇一摇功能
        function handleShake() {
            let lastTime = 0;
            let lastX = 0;
            let lastY = 0;
            let lastZ = 0;
            
            window.addEventListener('devicemotion', function(e) {
                const currentTime = new Date().getTime();
                
                // 限制频率，每500ms只处理一次
                if (currentTime - lastTime > 500) {
                    const acceleration = e.accelerationIncludingGravity;
                    const currentX = acceleration.x;
                    const currentY = acceleration.y;
                    const currentZ = acceleration.z;
                    
                    // 计算加速度变化
                    const deltaX = Math.abs(currentX - lastX);
                    const deltaY = Math.abs(currentY - lastY);
                    const deltaZ = Math.abs(currentZ - lastZ);
                    
                    // 检测摇一摇动作
                    if (deltaX > 10 || deltaY > 10 || deltaZ > 10) {
                        const encouragement = getRandomEncouragement();
                        document.getElementById('secretMessage').textContent = encouragement;
                        document.getElementById('secretMessage').style.display = 'block';
                    }
                    
                    lastTime = currentTime;
                    lastX = currentX;
                    lastY = currentY;
                    lastZ = currentZ;
                }
            });
        }
        
        // 初始化
        function init() {
            // 显示随机语录
            document.getElementById('quoteText').textContent = getRandomQuote();
            
            // 点击语录卡片刷新
            document.querySelector('.quote-card').addEventListener('click', function() {
                document.getElementById('quoteText').textContent = getRandomQuote();
            });
            
            // 渲染日历
            renderCalendar();
            
            // 处理月份导航
            handleMonthNavigation();
            
            // 更新心情记录
            updateMoodRecords();
            
            // 处理摇一摇功能
            handleShake();
        }
        
        // 页面加载完成后初始化
        window.onload = init;
        
        // 注册service worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(function(registration) {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    })
                    .catch(function(error) {
                        console.log('ServiceWorker registration failed: ', error);
                    });
            });
        }
    </script>
</body>
</html>
